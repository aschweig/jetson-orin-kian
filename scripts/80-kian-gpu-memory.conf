# /etc/sysctl.d/80-kian-gpu-memory.conf
#
# Jetson unified memory tuning: ensure NVMAP can reclaim page cache
# aggressively enough to allocate GPU memory for LLM inference.
#
# min_free_kbytes: Reserve 256MB so NVMAP allocations don't fail
# when page cache is bloated from loading ONNX/GGUF/SQLite files.
vm.min_free_kbytes = 262144
#
# vfs_cache_pressure: Default is 100. Higher values make the kernel
# reclaim dentries/inodes (and associated page cache) more aggressively.
vm.vfs_cache_pressure = 200
#
# watermark_scale_factor: Controls gap between min/low/high watermarks.
# Higher = kernel starts reclaiming sooner. Default is 10 (0.1%),
# set to 50 (0.5%) to start kswapd earlier on this memory-constrained system.
vm.watermark_scale_factor = 50
